kind = "web"
previewPath = "/"
title = "Meeting Minutes"
version = "1.0.0"
id = "artifacts/minutes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22199

[services.development]
run = "pnpm --filter @workspace/minutes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/minutes", "run", "build" ]
publicDir = "artifacts/minutes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22199"
BASE_PATH = "/"
